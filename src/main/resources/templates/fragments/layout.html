<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | Stubox'">Stubox</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
<div class="navbar sticky top-0 z-20 border-b border-base-300 bg-base-100/95 px-4 backdrop-blur">
    <div class="navbar-start">
        <a class="btn btn-ghost text-xl font-bold" th:href="@{/posts}">Stubox</a>
    </div>
    <div class="navbar-center hidden gap-1 md:flex">
        <a class="btn btn-ghost btn-sm" th:href="@{/posts}">Posts</a>
        <a class="btn btn-ghost btn-sm auth-only hidden" th:href="@{/posts/new}">Write</a>
    </div>
    <div class="navbar-end gap-2">
        <a class="btn btn-ghost btn-sm auth-only hidden" th:href="@{/me}">My</a>
        <a class="btn btn-primary btn-sm guest-only" th:href="@{/login}">Login</a>
        <button class="btn btn-outline btn-sm auth-only hidden" type="button" data-logout>Logout</button>
    </div>
</div>

<main class="mx-auto w-full max-w-5xl px-4 py-8" th:insert="${content}">
</main>
</body>
</html>
