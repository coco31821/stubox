<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${post.title()}, ~{::content})}">
<section th:fragment="content" class="space-y-8">
    <article class="rounded-box border border-base-300 bg-base-100 p-6">
        <div class="mb-5 flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
            <div>
                <div class="mb-3 flex flex-wrap items-center gap-2">
                    <span class="badge badge-primary badge-outline" th:text="${post.boardName()}">board</span>
                    <span class="text-sm text-base-content/60" th:text="${post.nickname()}">nickname</span>
                    <span class="text-sm text-base-content/50" th:text="${post.createdAt()}">date</span>
                </div>
                <h1 class="text-3xl font-bold tracking-normal" th:text="${post.title()}">title</h1>
            </div>
            <div class="flex gap-2 auth-only hidden">
                <a class="btn btn-outline btn-sm"
                   th:href="@{/posts/{postId}/edit(postId=${post.postId()})}">수정</a>
                <button class="btn btn-error btn-outline btn-sm"
                        type="button"
                        th:attr="data-delete-post=${post.postId()}">삭제</button>
            </div>
        </div>
        <div class="prose max-w-none whitespace-pre-wrap leading-7" th:text="${post.content()}">content</div>
    </article>

    <section class="space-y-4">
        <div class="flex items-center justify-between">
            <h2 class="text-xl font-bold">댓글</h2>
            <span class="badge" th:text="${#lists.size(comments)}">0</span>
        </div>

        <form class="auth-only hidden rounded-box border border-base-300 bg-base-100 p-4"
              data-comment-form
              th:attr="data-post-id=${post.postId()}">
            <label class="form-control">
                <span class="label-text mb-2">댓글 작성</span>
                <textarea class="textarea textarea-bordered min-h-24"
                          name="content"
                          placeholder="생각을 남겨주세요."
                          required></textarea>
            </label>
            <div class="mt-3 flex justify-end">
                <button class="btn btn-primary" type="submit">등록</button>
            </div>
        </form>

        <div class="guest-only rounded-box border border-dashed border-base-300 bg-base-100 p-5 text-center">
            <p class="text-sm text-base-content/70">댓글을 작성하려면 로그인하세요.</p>
            <a class="btn btn-primary btn-sm mt-3" th:href="@{/login}">로그인</a>
        </div>

        <div class="space-y-3">
            <div th:if="${#lists.isEmpty(comments)}" class="rounded-box bg-base-100 p-8 text-center text-base-content/60">
                아직 댓글이 없습니다.
            </div>
            <div th:each="comment : ${comments}" class="rounded-box border border-base-300 bg-base-100 p-4">
                <div class="mb-2 flex items-start justify-between gap-3">
                    <div>
                        <strong th:text="${comment.nickname()}">nickname</strong>
                        <time class="ml-2 text-sm text-base-content/50" th:text="${comment.createdAt()}">date</time>
                    </div>
                    <button class="btn btn-error btn-ghost btn-xs auth-only hidden"
                            type="button"
                            th:attr="data-delete-comment=${comment.commentId()}">삭제</button>
                </div>
                <p class="whitespace-pre-wrap leading-6" th:text="${comment.content()}">content</p>
            </div>
        </div>
    </section>
</section>
</html>
