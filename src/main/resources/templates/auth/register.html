<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('회원가입', ~{::content})}">
<section th:fragment="content" class="mx-auto max-w-md">
    <form class="rounded-box border border-base-300 bg-base-100 p-6 shadow-sm" data-register-form>
        <div class="mb-6">
            <p class="text-sm font-semibold text-primary">Join Stubox</p>
            <h1 class="text-3xl font-bold tracking-normal">회원가입</h1>
        </div>

        <div class="grid gap-4">
            <label class="form-control">
                <span class="label-text mb-2">이메일</span>
                <input class="input input-bordered" type="email" name="email" autocomplete="email" required>
            </label>
            <label class="form-control">
                <span class="label-text mb-2">닉네임</span>
                <input class="input input-bordered" type="text" name="nickname" minlength="2" maxlength="20" required>
            </label>
            <label class="form-control">
                <span class="label-text mb-2">비밀번호</span>
                <input class="input input-bordered" type="password" name="password" minlength="8" maxlength="64" autocomplete="new-password" required>
            </label>
        </div>

        <button class="btn btn-primary mt-6 w-full" type="submit">가입하기</button>
        <p class="mt-4 text-center text-sm text-base-content/70">
            이미 계정이 있다면
            <a class="link link-primary" th:href="@{/login}">로그인</a>
        </p>
    </form>
</section>
</html>
