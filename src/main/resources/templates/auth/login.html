<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('로그인', ~{::content})}">
<section th:fragment="content" class="mx-auto max-w-md">
    <form class="rounded-box border border-base-300 bg-base-100 p-6 shadow-sm" data-login-form>
        <div class="mb-6">
            <p class="text-sm font-semibold text-primary">Welcome back</p>
            <h1 class="text-3xl font-bold tracking-normal">로그인</h1>
        </div>

        <div class="grid gap-4">
            <label class="form-control">
                <span class="label-text mb-2">이메일</span>
                <input class="input input-bordered" type="email" name="email" autocomplete="email" required>
            </label>
            <label class="form-control">
                <span class="label-text mb-2">비밀번호</span>
                <input class="input input-bordered" type="password" name="password" autocomplete="current-password" required>
            </label>
        </div>

        <button class="btn btn-primary mt-6 w-full" type="submit">로그인</button>
        <p class="mt-4 text-center text-sm text-base-content/70">
            계정이 없다면
            <a class="link link-primary" th:href="@{/register}">회원가입</a>
        </p>
    </form>
</section>
</html>
